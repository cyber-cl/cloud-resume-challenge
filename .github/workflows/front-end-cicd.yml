name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Pass 1 — static assets (images, PDF, fonts): cached for 1 year.
      # These rarely change; if one does, rename the file to bust the cache.
      - name: Deploy assets to S3 (long cache)
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "*" \
            --include "images/*" \
            --include "*.pdf" \
            --exclude "images/PROFILE_PIC_INSTRUCTIONS.txt" \
            --cache-control "public, max-age=31536000, immutable"

      # Pass 2 — HTML/CSS/JS: browsers must revalidate on every load so
      # deploys show up immediately. CloudFront still caches at the edge.
      - name: Deploy site files to S3 (no cache)
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.html" \
            --include "*.css" \
            --include "*.js" \
            --include "favicon.ico" \
            --exclude ".git*" \
            --exclude ".github/*" \
            --exclude "terraform/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
